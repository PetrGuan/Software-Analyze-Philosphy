name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: |
            **/*.md

  link-check:
    name: Internal link check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check markdown internal links
        shell: bash
        run: |
          set -euo pipefail

          cat > /tmp/mlc_config.json <<'JSON'
          {
            "ignorePatterns": [
              { "pattern": "^https?://" },
              { "pattern": "^mailto:" }
            ],
            "replacementPatterns": [
              {
                "pattern": "^/",
                "replacement": "./"
              }
            ]
          }
          JSON

          while IFS= read -r -d '' file; do
            echo "Checking $file"
            npx -y markdown-link-check "$file" -q -c /tmp/mlc_config.json
          done < <(find . -type f -name "*.md" -print0)
